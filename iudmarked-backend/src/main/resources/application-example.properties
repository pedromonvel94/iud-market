spring.application.name=iudmarket
server.port=8080

#Configuracion de la base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/iud_market
spring.datasource.username=TU_USUARIO
spring.datasource.password=TU_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Usuarios HTTP Basic (definir en application.properties local)
app.security.admin.username=TU_ADMIN
app.security.admin.password=TU_PASSWORD_ADMIN
app.security.cajera.username=TU_CAJERA
app.security.cajera.password=TU_PASSWORD_CAJERA