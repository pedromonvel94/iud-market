spring.application.name=iudmarket
server.port=8080

#Configuracion de la base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/iud_market
spring.datasource.username=postgres
spring.datasource.password=root12345
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuracion de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Usuarios HTTP Basic (cambiar en producción)
app.security.admin.username=admin
app.security.admin.password=admin123
app.security.cajera.username=cajera
app.security.cajera.password=cajera123